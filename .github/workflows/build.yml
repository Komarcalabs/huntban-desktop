name: Build Desktop App

on:
  push:
    branches:
      - main
      - upgrade
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout huntban-desktop
        uses: actions/checkout@v4

      - name: Clone Huntban Client from GitLab
        shell: bash
        run: |
          git clone -b upgrade https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/jholarck/huntban-client.git

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: huntban-client/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          cd huntban-client
          npm install

      - name: Sync version to huntban-client
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Syncing version $VERSION to huntban-client..."
          cd huntban-client
          node -e "let p=require('./package.json'); p.version='$VERSION'; require('fs').writeFileSync('./package.json', JSON.stringify(p, null, 2))"
          node -e "let t=require('./src-tauri/tauri.conf.json'); t.version='$VERSION'; require('fs').writeFileSync('./src-tauri/tauri.conf.json', JSON.stringify(t, null, 2))"

      - name: Build Windows App
        run: |
          cd huntban-client
          npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Generate Signatures (Windows)
        shell: bash
        env:
          SIGNING_KEY_DATA: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cd huntban-client
          echo "Generating temporary key file..."
          node -e "require('fs').writeFileSync('sign_private.txt', process.env.SIGNING_KEY_DATA.trim())"

          # Sign MSI
          MSI_FILE=$(ls src-tauri/target/release/bundle/msi/*.msi | head -n 1)
          if [ -f "$MSI_FILE" ]; then
            echo "Signing $MSI_FILE..."
            npx tauri signer sign -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" -f sign_private.txt "$MSI_FILE" > "$MSI_FILE.sig"
          fi

          # Sign EXE (NSIS)
          EXE_FILE=$(ls src-tauri/target/release/bundle/nsis/*.exe | head -n 1)
          if [ -f "$EXE_FILE" ]; then
            echo "Signing $EXE_FILE..."
            npx tauri signer sign -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" -f sign_private.txt "$EXE_FILE" > "$EXE_FILE.sig"
          fi

          rm sign_private.txt

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: huntban-windows-installer
          path: |
            huntban-client/src-tauri/target/release/bundle/msi/*.msi
            huntban-client/src-tauri/target/release/bundle/msi/*.msi.sig
            huntban-client/src-tauri/target/release/bundle/nsis/*.exe
            huntban-client/src-tauri/target/release/bundle/nsis/*.exe.sig

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout huntban-desktop
        uses: actions/checkout@v4

      - name: Clone Huntban Client from GitLab
        run: |
          git clone -b upgrade https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/jholarck/huntban-client.git

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: huntban-client/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          cd huntban-client
          npm install

      - name: Sync version to huntban-client
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Syncing version $VERSION to huntban-client..."
          cd huntban-client
          node -e "let p=require('./package.json'); p.version='$VERSION'; require('fs').writeFileSync('./package.json', JSON.stringify(p, null, 2))"
          node -e "let t=require('./src-tauri/tauri.conf.json'); t.version='$VERSION'; require('fs').writeFileSync('./src-tauri/tauri.conf.json', JSON.stringify(t, null, 2))"

      - name: Build MacOS App
        run: |
          cd huntban-client
          npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Generate Signatures (MacOS)
        env:
          SIGNING_KEY_DATA: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cd huntban-client
          echo "Generating temporary key file..."
          node -e "require('fs').writeFileSync('sign_private.txt', process.env.SIGNING_KEY_DATA.trim())"

          # Sign DMG
          DMG_FILE=$(ls src-tauri/target/release/bundle/dmg/*.dmg | head -n 1)
          if [ -f "$DMG_FILE" ]; then
            echo "Signing $DMG_FILE..."
            npx tauri signer sign -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" -f sign_private.txt "$DMG_FILE" > "$DMG_FILE.sig"
          fi

          rm sign_private.txt

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: huntban-macos-installer
          path: |
            huntban-client/src-tauri/target/release/bundle/dmg/*.dmg
            huntban-client/src-tauri/target/release/bundle/dmg/*.dmg.sig
            huntban-client/src-tauri/target/release/bundle/macos/*.app.tar.gz
            huntban-client/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig

  publish-release:
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: huntban-windows-installer
          path: ./artifacts/windows

      - name: Download MacOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: huntban-macos-installer
          path: ./artifacts/macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/windows/**/*
            ./artifacts/macos/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
