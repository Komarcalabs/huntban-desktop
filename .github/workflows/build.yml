name: Build Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout huntban-desktop
        uses: actions/checkout@v4

      - name: Clone Huntban Client from GitLab
        shell: bash
        run: |
          git clone -b upgrade https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/jholarck/huntban-client.git

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: huntban-client/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          cd huntban-client
          npm install

      - name: Sync version to huntban-client
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Syncing version $VERSION to huntban-client..."
          cd huntban-client
          node -e "let p=require('./package.json'); p.version='$VERSION'; require('fs').writeFileSync('./package.json', JSON.stringify(p, null, 2))"
          node -e "let t=require('./src-tauri/tauri.conf.json'); t.version='$VERSION'; t.bundle = t.bundle || {}; t.bundle.createUpdaterArtifacts=true; require('fs').writeFileSync('./src-tauri/tauri.conf.json', JSON.stringify(t, null, 2))"

      - name: Build Windows App
        run: |
          cd huntban-client
          npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Generate Signatures (Windows)
        shell: bash
        env:
          SIGNING_KEY_DATA: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cd huntban-client
          echo "Generating temporary key file..."
          node -e "require('fs').writeFileSync('sign_private.txt', process.env.SIGNING_KEY_DATA.trim())"

          # Dynamically find and sign all target files
          find "src-tauri/target/release/bundle" -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.zip" \) -not -name "*.sig" | while read file; do
            echo "Signing $file..."
            npx tauri signer sign -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" -f sign_private.txt "$file" > "$file.sig"
          done

          rm sign_private.txt

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: huntban-windows-installer
          path: |
            huntban-client/src-tauri/target/release/bundle/**/*.msi
            huntban-client/src-tauri/target/release/bundle/**/*.msi.sig
            huntban-client/src-tauri/target/release/bundle/**/*.exe
            huntban-client/src-tauri/target/release/bundle/**/*.exe.sig
            huntban-client/src-tauri/target/release/bundle/**/*.zip
            huntban-client/src-tauri/target/release/bundle/**/*.zip.sig

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout huntban-desktop
        uses: actions/checkout@v4

      - name: Clone Huntban Client from GitLab
        run: |
          git clone -b upgrade https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/jholarck/huntban-client.git

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: huntban-client/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          cd huntban-client
          npm install

      - name: Sync version to huntban-client
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Syncing version $VERSION to huntban-client..."
          cd huntban-client
          node -e "let p=require('./package.json'); p.version='$VERSION'; require('fs').writeFileSync('./package.json', JSON.stringify(p, null, 2))"
          node -e "let t=require('./src-tauri/tauri.conf.json'); t.version='$VERSION'; t.bundle = t.bundle || {}; t.bundle.createUpdaterArtifacts=true; require('fs').writeFileSync('./src-tauri/tauri.conf.json', JSON.stringify(t, null, 2))"

      - name: Build MacOS App
        run: |
          cd huntban-client
          npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Generate Signatures (MacOS)
        env:
          SIGNING_KEY_DATA: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cd huntban-client
          echo "Generating temporary key file..."
          node -e "require('fs').writeFileSync('sign_private.txt', process.env.SIGNING_KEY_DATA.trim())"

          # Dynamically find and sign all target files
          find "src-tauri/target/release/bundle" -type f \( -name "*.dmg" -o -name "*.app.tar.gz" \) | while read file; do
            echo "Signing $file..."
            npx tauri signer sign -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" -f sign_private.txt "$file" > "$file.sig"
          done

          rm sign_private.txt

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: huntban-macos-installer
          path: |
            huntban-client/src-tauri/target/release/bundle/**/*.dmg
            huntban-client/src-tauri/target/release/bundle/**/*.dmg.sig
            huntban-client/src-tauri/target/release/bundle/**/*.app.tar.gz
            huntban-client/src-tauri/target/release/bundle/**/*.app.tar.gz.sig

  publish-release:
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: huntban-windows-installer
          path: ./artifacts/windows

      - name: Download MacOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: huntban-macos-installer
          path: ./artifacts/macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/windows/**/*
            ./artifacts/macos/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-backend:
    needs: [publish-release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: huntban-windows-installer
          path: ./artifacts/windows

      - name: Download MacOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: huntban-macos-installer
          path: ./artifacts/macos

      - name: Notify Backend Webhook
        env:
          UPDATE_WEBHOOK_SECRET: ${{ secrets.UPDATE_WEBHOOK_SECRET }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}

          MAC_SIG_FILE=$(find ./artifacts/macos -name "*.app.tar.gz.sig" | head -n 1)
          WIN_SIG_FILE=$(find ./artifacts/windows -name "*.exe.sig" | head -n 1)

          MAC_SIG=$(awk '/Public signature:/{flag=1; next} /Make sure to include/{flag=0; next} flag' "$MAC_SIG_FILE" | awk 'NF' | tail -n 1 || echo "")
          WIN_SIG=$(awk '/Public signature:/{flag=1; next} /Make sure to include/{flag=0; next} flag' "$WIN_SIG_FILE" | awk 'NF' | tail -n 1 || echo "")

          echo "Notifying backend for version $VERSION..."

          # Use jq to safely construct the JSON payload with correctly escaped newline characters
          PAYLOAD=$(jq -n \
            --arg version "$VERSION" \
            --arg notes "Lanzamiento automatizado de Huntban Desktop v$VERSION" \
            --arg mac_sig "$MAC_SIG" \
            --arg mac_url "https://github.com/Komarcalabs/huntban-desktop/releases/download/v$VERSION/Huntban.app.tar.gz" \
            --arg win_sig "$WIN_SIG" \
            --arg win_url "https://github.com/Komarcalabs/huntban-desktop/releases/download/v$VERSION/Huntban_${VERSION}_x64-setup.exe" \
            '{
              version: $version,
              notes: $notes,
              platforms: {
                "darwin-aarch64": {
                  signature: $mac_sig,
                  url: $mac_url
                },
                "windows-x86_64": {
                  signature: $win_sig,
                  url: $win_url
                }
              }
            }')

          curl -X POST https://next.huntban.com/updates/webhook \
               -H "Authorization: Bearer $UPDATE_WEBHOOK_SECRET" \
               -H "Content-Type: application/json" \
               -d "$PAYLOAD"
