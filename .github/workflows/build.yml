name: Build Desktop App

on:
  push:
    branches:
      - main
      - upgrade
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout huntban-desktop
        uses: actions/checkout@v4

      - name: Clone Huntban Client from GitLab
        shell: bash
        run: |
          git clone -b upgrade https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/jholarck/huntban-client.git

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: huntban-client/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          cd huntban-client
          npm install

      - name: Build Windows App
        run: |
          cd huntban-client
          npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: huntban

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: huntban-windows-installer
          path: |
            huntban-client/src-tauri/target/release/bundle/msi/*.msi
            huntban-client/src-tauri/target/release/bundle/setup.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout huntban-desktop
        uses: actions/checkout@v4

      - name: Clone Huntban Client from GitLab
        run: |
          git clone -b upgrade https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/jholarck/huntban-client.git

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: huntban-client/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          cd huntban-client
          npm install

      - name: Build MacOS App
        run: |
          cd huntban-client
          npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: huntban

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: huntban-macos-installer
          path: |
            huntban-client/src-tauri/target/release/bundle/dmg/*.dmg
            huntban-client/src-tauri/target/release/bundle/macos/*.app
